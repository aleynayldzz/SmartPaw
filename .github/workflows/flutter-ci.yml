name: Flutter CI

on:
  push:
    branches: [master, main]
    paths:
      - 'smart_paw/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'smart_paw/**'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Get dependencies
        working-directory: smart_paw
        run: flutter pub get

      - name: Analyze code
        working-directory: smart_paw
        run: flutter analyze

      - name: Run tests
        working-directory: smart_paw
        run: flutter test

      - name: Build APK
        working-directory: smart_paw
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: smart_paw/build/app/outputs/flutter-apk/app-release.apk